version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 14
  - React 18
  - Tailwind CSS
  - next-intl
routes:
  - path: /en
    file: src/app/[locale]/page.tsx
    auth_required: false
    description: Home page
  - path: /en/register
    file: src/app/[locale]/(auth)/register/page.tsx
    auth_required: false
    description: User registration page
  - path: /en/login
    file: src/app/[locale]/(auth)/login/page.tsx
    auth_required: false
    description: User login page
  - path: /en/dashboard
    file: src/app/[locale]/(dashboard)/dashboard/page.tsx
    auth_required: true
    description: User dashboard
  - path: /en/chat
    file: src/app/[locale]/(dashboard)/chat/page.tsx
    auth_required: true
    description: AI chat interface
  - path: /en/profile
    file: src/app/[locale]/(dashboard)/profile/page.tsx
    auth_required: true
    description: User profile
  - path: /en/onboarding
    file: src/app/[locale]/(dashboard)/onboarding/page.tsx
    auth_required: true
    description: Language preferences onboarding
features:
  - name: User Registration
    description: Register with name, email, password. After registration, user selects a plan and can proceed to dashboard.
    files:
      - src/app/[locale]/(auth)/register/page.tsx
      - src/app/api/auth/register/route.ts
    entry_route: /en/register
    user_interactions:
      - Fill name input field
      - Fill email input field
      - Fill password input field
      - Click submit/continue button
      - Select a plan (base, middle, or ultra)
      - Click to proceed to dashboard
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: User Login
    description: Login with email and password credentials
    files:
      - src/app/[locale]/(auth)/login/page.tsx
      - src/lib/auth.ts
    entry_route: /en/login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign In button to submit
      - See error message on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/[...nextauth]
    auth_required: false
known_limitations: []
